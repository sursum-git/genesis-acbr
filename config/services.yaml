imports:
  - { resource: services/consulta_cep.yaml }

services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\OpenApi\LegacyOptionalRequestBodyOpenApiFactory:
    decorates: 'api_platform.openapi.factory'
    arguments:
      $decorated: '@App\OpenApi\LegacyOptionalRequestBodyOpenApiFactory.inner'

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'
