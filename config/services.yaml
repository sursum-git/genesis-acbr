imports:
  - { resource: services/consulta_cep.yaml }
  - { resource: services/doctrine_connection.xml }

services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  App\OpenApi\LegacyOptionalRequestBodyOpenApiFactory:
    decorates: 'api_platform.openapi.factory'
    arguments:
      $decorated: '@App\OpenApi\LegacyOptionalRequestBodyOpenApiFactory.inner'

  App\OpenApi\SwaggerUiHtmlProcessor:
    decorates: 'api_platform.swagger_ui.processor'
    arguments:
      $decorated: '@App\OpenApi\SwaggerUiHtmlProcessor.inner'
